name: Flutter Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🚀 Install Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      # 📦 Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 🔍 Analyze (won’t fail build)
      - name: Analyze project
        run: |
          flutter analyze || echo "Analysis completed with warnings"

      # 🧪 Run tests only if folder exists
      - name: Run tests (skip if none)
        run: |
          if [ -d "test" ]; then
            flutter test
          else
            echo "No tests found, skipping..."
          fi

      # 📱 Build APK
      - name: Build APK
        run: flutter build apk --release
