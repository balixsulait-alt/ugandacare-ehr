name: Flutter Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Install Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      # ✅ Install dependencies (FIXED)
      - name: Install dependencies
        run: flutter pub get

      # ✅ Analyze code
      - name: Analyze project source
        run: flutter analyze

      # ✅ Run tests (Flutter version)
      - name: Run tests
        run: flutter test

      # ✅ Build APK (optional but recommended)
      - name: Build APK
        run: flutter build apk
