name: Flutter Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🚀 Install Flutter (UPDATED VERSION)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      # 📦 Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 🔍 Analyze code
      - name: Analyze project
        run: flutter analyze

      # 🧪 Run tests
      - name: Run tests
        run: flutter test

      # 📱 Build APK
      - name: Build APK
        run: flutter build apk --release
